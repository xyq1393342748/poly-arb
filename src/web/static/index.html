<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poly Arb Dashboard</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(12, 27, 44, 0.82);
      --panel-strong: rgba(17, 39, 64, 0.95);
      --text: #e6f1ff;
      --muted: #8ca6c2;
      --line: rgba(255,255,255,0.08);
      --good: #4fe0a5;
      --warn: #f0c36d;
      --bad: #ff7b7b;
      --accent: #6bd3ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(107, 211, 255, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(79, 224, 165, 0.12), transparent 28%),
        linear-gradient(180deg, #06101d 0%, #09192b 54%, #06101b 100%);
      min-height: 100vh;
    }
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lang-btn {
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .status-pill {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.22);
    }
    .hero {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .metric {
      font-size: 28px;
      font-weight: 700;
    }
    .metric-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }
    .hero-value {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 14px;
    }
    .hero-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }
    th {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
    }
    .good { color: var(--good); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    .mono { font-family: "IBM Plex Mono", monospace; }
    @media (max-width: 980px) {
      .grid, .hero { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 720px) {
      .grid, .hero { grid-template-columns: 1fr; }
      .hero-value { font-size: 36px; }
      .shell { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="title">Poly Arb</div>
      <div class="topbar-right">
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">中文</button>
        <div class="status-pill" id="bot-status">starting</div>
      </div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="label" data-i18n="tracked_markets">Tracked Markets</div>
        <div class="metric" id="tracked-markets">0</div>
      </section>
      <section class="panel">
        <div class="label" data-i18n="tracked_books">Tracked Books</div>
        <div class="metric" id="tracked-books">0</div>
      </section>
      <section class="panel">
        <div class="label" data-i18n="today_pnl">Today PnL</div>
        <div class="metric" id="today-profit">$0.00</div>
      </section>
      <section class="panel">
        <div class="label" data-i18n="lifetime_profit">Lifetime Profit</div>
        <div class="metric" id="lifetime-profit">$0.00</div>
      </section>
    </div>

    <div class="hero">
      <section class="panel">
        <div class="label" data-i18n="live_orderbook">Live Orderbook</div>
        <div style="display:flex; gap:24px; align-items:baseline; margin-bottom:14px;">
          <div>
            <div class="label" style="margin-bottom:4px" data-i18n="ask_up">Ask Up</div>
            <div class="metric mono" id="hero-ask-up">-</div>
          </div>
          <div style="font-size:28px; font-weight:700; color:var(--muted)">+</div>
          <div>
            <div class="label" style="margin-bottom:4px" data-i18n="ask_down">Ask Down</div>
            <div class="metric mono" id="hero-ask-down">-</div>
          </div>
          <div style="font-size:28px; font-weight:700; color:var(--muted)">=</div>
          <div>
            <div class="label" style="margin-bottom:4px" data-i18n="sum">Sum</div>
            <div class="metric mono" id="hero-sum" style="font-size:32px">-</div>
          </div>
        </div>
        <div class="hero-row mono">
          <div id="hero-profit">profit: -</div>
          <div id="hero-condition">market: -</div>
          <div id="hero-expiry">expiry: -</div>
        </div>
      </section>
      <section class="panel">
        <div class="label" data-i18n="risk">Risk</div>
        <div class="metric" id="risk-status">allowed</div>
        <div class="metric-sub" id="risk-meta">losses: 0 | open orders: 0</div>
      </section>
    </div>

    <div class="hero">
      <section class="panel">
        <div class="label" data-i18n="recent_trades">Recent Trades</div>
        <table>
          <thead><tr>
            <th data-i18n="th_time">Time</th>
            <th data-i18n="th_market">Market</th>
            <th data-i18n="th_status">Status</th>
            <th data-i18n="th_qty">Qty</th>
            <th data-i18n="th_profit">Profit</th>
          </tr></thead>
          <tbody id="trades-body"></tbody>
        </table>
      </section>
      <section class="panel">
        <div class="label" data-i18n="opportunities">Opportunities</div>
        <table>
          <thead><tr>
            <th data-i18n="th_time">Time</th>
            <th data-i18n="th_condition">Condition</th>
            <th data-i18n="th_edge">Edge</th>
            <th data-i18n="th_exec">Exec</th>
          </tr></thead>
          <tbody id="opps-body"></tbody>
        </table>
      </section>
    </div>
  </div>

  <script>
    // ─── i18n ───────────────────────────────────────────────────────────
    const I18N = {
      en: {
        tracked_markets: 'Tracked Markets',
        tracked_books: 'Tracked Books',
        today_pnl: 'Today PnL',
        lifetime_profit: 'Lifetime Profit',
        live_orderbook: 'Live Orderbook',
        ask_up: 'Ask Up',
        ask_down: 'Ask Down',
        sum: 'Sum',
        risk: 'Risk',
        recent_trades: 'Recent Trades',
        opportunities: 'Opportunities',
        th_time: 'Time',
        th_market: 'Market',
        th_status: 'Status',
        th_qty: 'Qty',
        th_profit: 'Profit',
        th_condition: 'Condition',
        th_edge: 'Edge',
        th_exec: 'Exec',
        profit: 'profit',
        market: 'market',
        expiry: 'expiry',
        allowed: 'allowed',
        blocked: 'blocked',
        losses: 'losses',
        open_orders: 'open orders',
        yes: 'yes',
        no: 'no',
      },
      zh: {
        tracked_markets: '跟踪市场',
        tracked_books: '订单簿',
        today_pnl: '今日盈亏',
        lifetime_profit: '累计利润',
        live_orderbook: '实时盘口',
        ask_up: '看涨卖价',
        ask_down: '看跌卖价',
        sum: '总和',
        risk: '风控',
        recent_trades: '最近交易',
        opportunities: '套利机会',
        th_time: '时间',
        th_market: '市场',
        th_status: '状态',
        th_qty: '数量',
        th_profit: '盈亏',
        th_condition: '合约',
        th_edge: '利差',
        th_exec: '执行',
        profit: '利润',
        market: '市场',
        expiry: '到期',
        allowed: '允许',
        blocked: '已阻止',
        losses: '亏损次数',
        open_orders: '挂单数',
        yes: '是',
        no: '否',
      },
    };

    let currentLang = localStorage.getItem('poly-arb-lang') || 'en';

    function t(key) { return (I18N[currentLang] || I18N.en)[key] || key; }

    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.getElementById('lang-toggle').textContent = currentLang === 'en' ? '中文' : 'EN';
    }

    function toggleLang() {
      currentLang = currentLang === 'en' ? 'zh' : 'en';
      localStorage.setItem('poly-arb-lang', currentLang);
      applyI18n();
      loadStatus().catch(console.error);
    }

    // ─── Utils ──────────────────────────────────────────────────────────
    const fmtUsd = (n) => {
      const value = Number(n || 0);
      return `${value >= 0 ? '+' : ''}$${value.toFixed(4)}`;
    };
    const setText = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    };

    async function fetchJson(path) {
      const res = await fetch(path);
      return res.json();
    }

    // ─── Status ─────────────────────────────────────────────────────────
    async function loadStatus() {
      const status = await fetchJson('/api/status');
      setText('bot-status', status.bot_status.state || 'watching');
      setText('tracked-markets', status.tracked_markets);
      setText('tracked-books', status.tracked_books);
      setText('today-profit', fmtUsd(status.today.total_profit));
      setText('lifetime-profit', fmtUsd(status.lifetime.total_profit));
      setText('risk-status', status.risk.is_trading_allowed ? t('allowed') : t('blocked'));
      setText('risk-meta', `${t('losses')}: ${status.risk.consecutive_losses} | ${t('open_orders')}: ${status.risk.open_orders}`);
    }

    // ─── Tables ─────────────────────────────────────────────────────────
    async function loadTables() {
      const [trades, opps] = await Promise.all([
        fetchJson('/api/trades?limit=8'),
        fetchJson('/api/opportunities?limit=8'),
      ]);
      document.getElementById('trades-body').innerHTML = trades.map((trade) => `
        <tr>
          <td>${trade.created_at || '-'}</td>
          <td class="mono">${(trade.condition_id || '').slice(0, 10)}</td>
          <td>${trade.status}</td>
          <td>${trade.quantity}</td>
          <td class="${(trade.net_profit || 0) >= 0 ? 'good' : 'bad'}">${fmtUsd(trade.net_profit || 0)}</td>
        </tr>
      `).join('');
      document.getElementById('opps-body').innerHTML = opps.map((opp) => `
        <tr>
          <td>${opp.created_at || '-'}</td>
          <td class="mono">${(opp.condition_id || '').slice(0, 10)}</td>
          <td class="${opp.net_profit >= 0 ? 'good' : 'bad'}">${fmtUsd(opp.net_profit)}</td>
          <td>${opp.executed ? t('yes') : t('no')}</td>
        </tr>
      `).join('');
    }

    // ─── WebSocket ──────────────────────────────────────────────────────
    function connectWs() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${location.host}/ws/live`);
      ws.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        if (payload.type === 'Ticker') {
          const data = payload.data;
          setText('hero-ask-up', data.ask_up != null ? data.ask_up.toFixed(4) : '-');
          setText('hero-ask-down', data.ask_down != null ? data.ask_down.toFixed(4) : '-');
          const sumEl = document.getElementById('hero-sum');
          if (sumEl && data.sum != null) {
            sumEl.textContent = data.sum.toFixed(4);
            sumEl.className = 'metric mono ' + (data.sum < 1 ? 'good' : data.sum < 1.01 ? 'warn' : 'bad');
          } else if (sumEl) {
            sumEl.textContent = '-';
            sumEl.className = 'metric mono';
          }
          setText('hero-profit', `${t('profit')}: ${data.net_profit_potential != null ? fmtUsd(data.net_profit_potential) : '-'}`);
          setText('hero-condition', `${t('market')}: ${data.condition_id ? data.condition_id.slice(0, 12) + '...' : '-'}`);
          const ttl = data.time_to_expiry_sec;
          setText('hero-expiry', `${t('expiry')}: ${ttl != null ? (ttl > 60 ? Math.floor(ttl/60) + 'm' + (ttl%60) + 's' : ttl + 's') : '-'}`);
          setText('bot-status', data.bot_status || 'watching');
        }
      };
      ws.onclose = () => setTimeout(connectWs, 1500);
    }

    // ─── Init ───────────────────────────────────────────────────────────
    applyI18n();
    loadStatus().catch(console.error);
    loadTables().catch(console.error);
    connectWs();
    setInterval(() => loadStatus().catch(console.error), 5000);
    setInterval(() => loadTables().catch(console.error), 10000);
  </script>
</body>
</html>
